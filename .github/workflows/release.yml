name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Adaka ${{ github.ref_name }}"
          releaseBody: |
            ## Adaka ${{ github.ref_name }}

            **Close five apps. Open one.**

            > ⚠️ Binaries are unsigned. See the README for SmartScreen / Gatekeeper instructions.

            ### Installation

            | OS | File | Notes |
            |---|---|---|
            | Windows | `.msi` (recommended) or `.exe` | SmartScreen: "More info" → "Run anyway" |
            | macOS | `.dmg` | Right-click → Open, then confirm |
            | Linux | `.deb` or `.AppImage` | AppImage: `chmod +x` then run |

            ### Performance budgets

            Measured binary sizes are reported in the workflow summary below.

            ---
            *Built from ${{ github.sha }}*
          releaseDraft: true
          prerelease: false

      # -----------------------------------------------------------------------
      # FOUNDATION budget gate: Windows binary must be < 30 MB
      # -----------------------------------------------------------------------
      - name: Assert binary size budget (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Recurse -Filter "*.msi" -Path "src-tauri/target/release/bundle" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No .msi found in bundle output"
            exit 1
          }
          $sizeMB = [math]::Round($msi.Length / 1MB, 2)
          Write-Host "::notice::Windows .msi size: ${sizeMB} MB"
          Write-Host "MSI_SIZE_MB=${sizeMB}" >> $env:GITHUB_STEP_SUMMARY

          if ($sizeMB -gt 30) {
            Write-Error "BUDGET EXCEEDED: .msi is ${sizeMB} MB (limit: 30 MB)"
            exit 1
          }
          Write-Host "✓ Binary size ${sizeMB} MB is within 30 MB budget"

      - name: Report binary sizes
        if: always()
        shell: bash
        run: |
          echo "## Binary sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null | while read f; do
            size=$(du -h "$f" | cut -f1)
            name=$(basename "$f")
            echo "- **${name}**: ${size}" >> $GITHUB_STEP_SUMMARY
          done || true
